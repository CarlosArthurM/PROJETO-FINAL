<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>LOGIN PARA FUNCIONARIOS</title>
</head>

<body>
    <!-- Mensagens Flash do Django -->
    {% if messages %}
    <div class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 9999; min-width: 320px; max-width: 480px;">
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show shadow d-flex align-items-center gap-2 mb-2" role="alert">
                {% if message.tags == 'error' %}
                    <span>⚠️</span>
                {% else %}
                    <span>✅</span>
                {% endif %}
                <strong>{{ message }}</strong>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="container d-flex align-items-center justify-content-center" style="height: 100vh;">
        <div class="card shadow p-4" style="width: 400px;">
            <h4 class="text-center mb-4">LOGIN PARA FUNCIONÁRIOS</h4>
            
            <form action="{% url 'login_funcionario' %}" method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">CPF</label>
                    <input type="text" class="cpf form-control" name="cpf" placeholder="Digite seu CPF" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" class="form-control" name="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Entrar</button>

                <div class="text-center mt-3">
                    <a href="{% url 'tela_login' %}">Voltar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function() {
            $('.cpf').mask('000.000.000-00', {reverse: true});

            setTimeout(function() {
                $('.alert').fadeOut(600, function() {
                    $(this).remove();
                });
            }, 5000);
        });
    </script>
</body>
</html>
