<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        ul li{
            list-style-type: none;
        }
    </style>
    <title>PAGAMENTOS</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex justify-content-between p-4">
            <h2 style="text-transform: uppercase; margin: 0;">PAGAMENTOS DE {{nome_aluno}}</h2>
            <ul class="m-0 d-flex gap-2">
                <li><a href="{% url 'home_recepcionista' %}" class="btn btn-outline-danger">Voltar</a></li>
            </ul>
        </nav>
    </header>

    {% if messages %}
        {% for message in messages %}
            <div class="position-fixed top-0 start-50 translate-middle-x mt-4" role="alert" style="z-index: 1;">
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show p-2">
                    <strong>{{ message }}</strong>
                </div>
            </div>
        {% endfor %}
    {% endif %}

    <main>
        <div class="container d-flex justify-content-center" style="position: relative; top: 90px;">
            <form action="{% url 'cadastrar_pagamento' aluno_id %}" method="POST">
                {% csrf_token %}
                <div>
                    <label class="form-label fw-semibold">Forma de Pagamento</label>
                    <select class="form-select" name="forma_pagamento" required>
                        <option value="Pix">Pix</option>
                        <option value="Cartão Crédito">Cartão Crédito</option>
                        <option value="Cartão Débito">Cartão Débito</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>

                    <label class="form-label fw-semibold">Valor</label>
                    <input type="text" name="valor" class="valor form-control" min="1" required>

                    <div class="d-flex justify-content-center mt-4">
                        <button type="submit" class="btn btn-primary">REGISTRAR PAGAMENTO</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="container" style="position: relative; top: 150px;">
            <div class="d-flex align-items-center justify-content-between">
                <h4>PAGAMENTOS:</h4>
            </div>

            <div class="mt-5 p-2" style="height: 150px; overflow-x: hidden; overflow: auto;">
            {% for pagamento in lista_pagamentos %}
                <ul>
                    <li>
                        <form action="{% url 'editar_pagamento' aluno_id pagamento.id %}" method="POST">
                            {% csrf_token %}
                            <div class="d-flex align-items-center gap-2">

                                <label class="form-label fw-semibold m-0">Forma de Pagamento</label>
                                <select class="form-select" name="forma_pagamento" style="width: 15%;" required>
                                    <option value="Pix" {% if pagamento.forma_pagamento == "Pix" %} selected {% endif %}>Pix</option>
                                    <option value="Cartão Crédito" {% if pagamento.forma_pagamento == "Cartão Crédito" %} selected {% endif %}>Cartão Crédito</option>
                                    <option value="Cartão Débito" {% if pagamento.forma_pagamento == "Cartão Débito" %} selected {% endif %}>Cartão Débito</option>
                                    <option value="Dinheiro" {% if pagamento.forma_pagamento == "Dinheiro" %} selected {% endif %}>Dinheiro</option>
                                </select>

                                <label class="form-label fw-semibold m-0">Valor</label>
                                <input type="text" name="valor" value="{{pagamento.valor}}" class="valor form-control" style="width: 15%;" min="1" required>

                                <div class="d-flex gap-2"> 
                                    <button type="submit" class="btn btn-primary" onclick="return confirm('Tem certeza que deseja editar este pagamento?')">EDITAR PAGAMENTO</button>
                                    <a href="{% url 'deletar_pagamento' aluno_id pagamento.id %}" class="btn btn-danger" onclick="return confirm('Tem certeza que deseja deletar este pagamento?')">DELETAR</a>
                                </div>
                            </div>
                        </form>
                    </li>
                </ul>       
            {% empty %}
                <p class="text-center">NENHUM PAGAMENTO REGISTRADO</p>
            {% endfor %}
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('.valor').mask('000.000.000.000.000,00', {reverse: true});
        });

        $(document).ready(function() {
            setTimeout(function() {
                $('.alert').fadeOut('slow');
                
            }, 5000);
        });
    </script>
</body>
</html>
