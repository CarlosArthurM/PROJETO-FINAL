<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        ul li{
            list-style-type: none;
        }
    </style>
    <title>CADASTRO DE ALUNOS</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex justify-content-end p-4">
            <ul class="m-0 d-flex gap-2">
                <li><a href="{% url 'home_recepcionista' %}" class="btn btn-outline-danger">Voltar</a></li>
            </ul>
        </nav>
    </header>

    {% if messages %}
        {% for message in messages %}
            <div class="position-fixed top-0 start-50 translate-middle-x mt-4" role="alert" style="z-index: 1;">
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show p-2">
                    <strong>{{ message }}</strong>
                </div>
            </div>
        {% endfor %}
    {% endif %}

    <main>
        <div class="container" style="position: relative; top: 90px;">
            <div class="row justify-content-center">
                <div class="col-4" >
                    <form action="{% url 'cadastrar_aluno' %}" method="POST">
                        {% csrf_token %}

                        <label class="form-label fw-semibold">Nome Completo:</label>
                        <input type="text" class="form-control" name="nome" placeholder="Nome completo" required>

                        <label class="form-label fw-semibold">Telefone:</label>
                        <input type="text" class="form-control" id="tell" name="tell" placeholder="Telefone" required>

                        <label class="form-label fw-semibold">CPF:</label>
                        <input type="text" class="form-control" id="cpf" name="cpf" placeholder="CPF" required>

                        <label class="form-label fw-semibold">Sexo:</label>
                        <select name="sexo" id="sexo" class="form-select" required>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                        </select>
                        
                        <label class="form-label fw-semibold">Data de Nascimento:</label>
                        <input type="date" class="form-control" name="data_nascimento" required>

                        <div class="d-flex justify-content-center mt-4">
                            <button class="btn btn-primary" type="submit">Cadastrar Aluno</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#tell').mask('(00) 00000-0000');
            $('#cpf').mask('000.000.000-00', {reverse: true});
        });

        $(document).ready(function() {
            setTimeout(function() {
                $('.alert').fadeOut('slow');
            }, 5000);
        });
    </script>
</body>
</html>
