<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Ficha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        ul li{
            list-style-type: none;
        }
    </style>
    <title>CADASTRO DE FiCHAS</title>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex justify-content-end p-4">
            <ul class="m-0 d-flex gap-2">
                <li><a href="{% url 'cadastro_exercicios' %}"></a></li>
                <li><a href="{% url 'home_instrutor' %}" class="btn btn-outline-danger">Voltar</a></li>
            </ul>
        </nav>
    </header>

    {% if messages %}
        {% for message in messages %}
            <div class="position-fixed top-0 start-50 translate-middle-x mt-4" role="alert" style="z-index: 1;">
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show p-2">
                    <strong>{{ message }}</strong>
                </div>
            </div>
        {% endfor %}
    {% endif %}

    <div class="container py-5">
        <h2 class="mb-4 fw-bold">Cadastrar Ficha de Treino</h2>

        <form action="{% url 'cadastrar_treino' aluno_id %}" method="POST">
            {% csrf_token %}

            <div class="card shadow-sm p-4 mb-4">

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Divisão</label>
                        <select name="divisao" class="form-select" required>
                            <option value="ABC">ABC</option>
                            <option value="ABCD">ABCD</option>
                            <option value="ABCDE">ABCDE</option>
                            <option value="FULL BODY">FULL BODY</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Grupo</label>
                        <select name="grupo" class="form-select" required>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="FULL BODY">FULL BODY</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Nível</label>
                        <select name="nivel" class="form-select" required>
                            <option value="Iniciante">Iniciante</option>
                            <option value="Intermediário">Intermediário</option>
                            <option value="Avançado">Avançado</option>
                            <option value="Personalizado">Personalizado</option>
                        </select>
                    </div>
                </div>

                <hr>

                <h5 class="fw-bold mb-3">Exercícios</h5>

                <div id="lista_exercicios"></div>

                <button type="button" id="add_exercicio" class="btn btn-primary btn-sm mt-2">Adicionar Exercício</button>

            </div>

            <button type="submit" class="btn btn-success">Salvar Ficha</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let btnAddExercicio = document.querySelector("#add_exercicio");
        let listaExercicios = document.querySelector("#lista_exercicios");

        const exerciciosOptions = `{% for exercicio in Exercicios %}
            <option value="{{ exercicio.id }}">{{ exercicio.nome }}</option>
        {% endfor %}`;

        btnAddExercicio.addEventListener("click", () => {

            let exercicioDiv = document.createElement("div");
            exercicioDiv.classList.add("row", "align-items-center", "mb-2");

            exercicioDiv.innerHTML = `
                <div class="col-md-4">
                    <select name="exercicio_id[]" class="form-select" required>
                        ${exerciciosOptions}
                    </select>
                </div>

                <div class="col-md-2">
                    <input type="number" name="series[]" class="form-control" placeholder="Séries" min="1" required>
                </div>

                <div class="col-md-2">
                    <input type="number" name="repeticoes[]" class="form-control" placeholder="Reps" min="1" required>
                </div>

                <div class="col-md-2">
                    <button type="button" class="btn btn-danger btn-sm remover_exercicio">X</button>
                </div>
            `;

            listaExercicios.appendChild(exercicioDiv);

            exercicioDiv.querySelector(".remover_exercicio").addEventListener("click", () => {
                exercicioDiv.remove();
            });

        });

        setTimeout(() => {
            const alerts = document.querySelectorAll(".alert");
            alerts.forEach(alert => {
                alert.style.display = "none";
            });
        }, 5000);
    </script>

</body>
</html>
