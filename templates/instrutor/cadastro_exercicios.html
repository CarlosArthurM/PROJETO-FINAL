<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        ul li{
            list-style-type: none;
        }
    </style>
    <title>CADASTRO DE EXERCÍCIOS</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex justify-content-between p-4">
            <h2 class="m-0">CADASTRO DE EXERCÍCIOS</h2>
            <ul class="m-0 d-flex gap-2">
                <li><a href="{% url 'home_instrutor' %}" class="btn btn-outline-danger">Voltar</a></li>
            </ul>
        </nav>
    </header>

    {% if messages %}
        {% for message in messages %}
            <div class="position-fixed top-0 start-50 translate-middle-x mt-4" role="alert" style="z-index: 1;">
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show p-2">
                    <strong>{{ message }}</strong>
                </div>
            </div>
        {% endfor %}
    {% endif %}

    <main>
        <div class="container d-flex justify-content-center" style="position: relative; top: 90px;">
            <form action="{% url 'cadastrar_exercicio' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label class="form-label fw-semibold">Nome do Exercicio:</label>
                    <input type="text" name="nome" class="form-control" required>

                    <label class="form-label fw-semibold">Grupo Muscular:</label>
                    <select name="grupo_muscular" id="grupo_muscular" class="form-select" required>
                        <option value="Membros Superiores">Membros Superiores</option>
                        <option value="Músculos do Tórax e Abdômen">Músculos do Tórax e Abdômen</option>
                        <option value="Membros Inferiores">Membros Inferiores</option>
                    </select>

                    <div class="d-flex justify-content-center mt-4">
                        <button type="submit" class="btn btn-primary">CADASTRAR EXERCÍCIO</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="container" style="position: relative; top: 150px;">
            <div class="d-flex align-items-center justify-content-between">
                <h4>EXERCÍCIOS CADASTRADOS:</h4>
                <div>
                    <form method="GET" action="{% url 'cadastro_exercicios' %}">
                        <input type="text" name="search" class="form-control" placeholder="Digite para buscar..." value="{{ request.GET.search }}">
                    </form>
                </div>
            </div>

            <div class="mt-5 p-2" style="height: 150px; overflow-x: hidden; overflow: auto;">
            {% for exercicio in Exercicios %}
                <ul>
                    <li>
                        <form action="{% url 'editar_exercicio' exercicio.id %}" method="POST">
                            {% csrf_token %}
                            <div class="d-flex align-items-center gap-2">
                                <label class="form-label fw-semibold m-0">Nome:</label>
                                <input type="text" class="form-control" name="nome" value="{{ exercicio.nome }}" style="width: 25%;" required>

                                <label class="form-label fw-semibold m-0">Grupo Muscular:</label>
                                <select name="grupo_muscular" class="form-select" style="width: 25%;" required>
                                    <option value="Membros Superiores" {% if exercicio.grupo_muscular == 'Membros Superiores' %}selected{% endif %}>
                                        Membros Superiores
                                    </option>
                                    <option value="Músculos do Tórax e Abdômen" {% if exercicio.grupo_muscular == 'Músculos do Tórax e Abdômen' %}selected{% endif %}>
                                        Músculos do Tórax e Abdômen
                                    </option>
                                    <option value="Membros Inferiores" {% if exercicio.grupo_muscular == 'Membros Inferiores' %}selected{% endif %}>
                                        Membros Inferiores
                                    </option>
                                </select>

                                <div class="d-flex gap-2"> 
                                    <button type="submit" class="btn btn-primary" onclick="return confirm('Tem certeza que deseja editar este exercício?')">EDITAR EXERCÍCIO</button>
                                    <a href="{% url 'deletar_exercicio' exercicio.id %}" class="btn btn-danger" onclick="return confirm('Tem certeza que deseja deletar este exercício?')">DELETAR</a>
                                </div>
                            </div>
                        </form>
                    </li>
                </ul>       
            {% empty %}
                <p class="text-center">NENHUM EXERCÍCIO CADASTRADO</p>
            {% endfor %}
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            setTimeout(function() {
                $('.alert').fadeOut('slow');
            }, 5000);
        });
    </script>
</body>
</html>
